[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.24"
optimizer        = true
optimizer_runs   = 200
via_ir           = true
evm_version      = "cancun"
verbosity        = 2

[rpc_endpoints]
celo_sepolia = "${CELO_RPC_URL_SEPOLIA}"
celo_mainnet = "${CELO_RPC_URL_MAINNET}"

[etherscan]
celo_sepolia = { key = "placeholder", url = "https://celo-sepolia.blockscout.com/api" }
celo_mainnet = { key = "placeholder", url = "https://celo.blockscout.com/api" }
